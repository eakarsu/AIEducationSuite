version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ai_education_suite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ai_education_suite
      DB_USER: postgres
      DB_PASSWORD: postgres
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: change_this_in_production
      CORS_ORIGIN: http://localhost:3001
    depends_on:
      - db
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs

volumes:
  pgdata:
  uploads:
  logs:
